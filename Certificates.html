<!DOCTYPE html>
<html dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> Certificates System | Eduneers </title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

    :root {
      --primary: #0f172a;
      --primary-light: #1e293b;
      --accent: #f5b041;
      --accent-glow: rgba(245, 176, 65, 0.6);
      --electric-blue: #00d2ff;
      --electric-glow: rgba(0, 210, 255, 0.5);
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --text-main: #334155;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border-radius: 24px;
    }

    body.dark-mode {
      --primary: #f8fafc;
      --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --card-bg: rgba(15, 23, 42, 0.9);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      color: var(--text-main);
      min-height: 100vh;
      transition: background 0.5s, color 0.5s;
      overflow-x: hidden;
    }

    .circuit-bg {
      position: fixed;
      top: -5%;
      left: -5%;
      width: 110vw;
      height: 110vh;
      z-index: -1;
      background-image: radial-gradient(circle at 50% 50%, rgba(245, 176, 65, 0.05) 2px, transparent 2px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body.dark-mode .circuit-bg {
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.1) 2px, transparent 3px);
    }

    .navbar {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(16px);
      color: white;
      padding: 12px 0;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }

    .nav-brand h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
    }

    .nav-brand h2 .brand-text {
      background: linear-gradient(to left, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    body.dark-mode .nav-brand h2 .brand-text {
      background: linear-gradient(to left, #fff, var(--electric-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1.2rem;
    }

    .nav-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 25px;
    }

    @media (max-width: 992px) {
      .container { grid-template-columns: 1fr; }
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: var(--border-radius);
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      margin-bottom: 25px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
    }

    body.dark-mode .card-title { color: var(--electric-blue); }

    .designer-canvas-container {
      width: 100%;
      background: repeating-conic-gradient(#1e293b 0% 25%, #0f172a 0% 50%) 0 0 / 20px 20px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      cursor: crosshair;
      user-select: none;
      transition: border-color 0.3s;
    }

    .designer-canvas-container.dragging {
      border-color: var(--accent);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 0 3px var(--accent-glow);
    }

    canvas { width: 100%; display: block; pointer-events: none; }

    /* Drag overlay — receives all mouse events */
    .canvas-drag-overlay {
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    .canvas-overlay-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.45); font-weight: 800; text-align: center;
      pointer-events: none; font-size: 1rem; line-height: 1.8;
    }

    /* Coordinate tooltip */
    #coordTooltip {
      position: absolute;
      background: rgba(15,23,42,0.9);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 8px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      border: 1px solid rgba(245,176,65,0.3);
      backdrop-filter: blur(5px);
      z-index: 10;
    }

    /* Position info bar below canvas */
    .position-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.04);
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.06);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    body.dark-mode .position-info {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.06);
    }

    .position-info .coord-val {
      color: var(--accent);
      font-family: monospace;
      font-size: 0.9rem;
    }

    .snap-btn {
      background: rgba(0,210,255,0.1);
      border: 1px solid rgba(0,210,255,0.3);
      color: var(--electric-blue);
      padding: 5px 12px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Cairo';
    }

    .snap-btn:hover {
      background: rgba(0,210,255,0.2);
      transform: scale(1.05);
    }

    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }

    .control-item label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); }

    input[type="text"], input[type="number"], input[type="color"], select, textarea {
      width: 100%; padding: 12px; border-radius: 12px; border: 2px solid transparent;
      background: rgba(0,0,0,0.05); color: var(--text-main); font-family: 'Cairo';
      font-weight: 700; outline: none; transition: 0.3s;
    }

    body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

    .btn {
      padding: 14px 25px; border-radius: 14px; border: none; font-family: 'Cairo';
      font-weight: 800; font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
    }

    .btn-primary { background: var(--accent); color: #0f172a; width: 100%; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }
    .btn-email { background: #ea4335; color: white; }
    .btn-drive { background: linear-gradient(135deg, #1a73e8, #0d5bcc); color: white; }
    .btn-drive:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(26,115,232,0.4); }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--text-main); }

    .student-item {
      display: flex; justify-content: space-between; align-items: center; padding: 12px;
      background: rgba(0,0,0,0.02); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05);
    }

    body.dark-mode .student-item { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); }

    .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }
    .status-pending { background: rgba(245, 176, 65, 0.1); color: var(--accent); }
    .status-sending { background: rgba(0, 210, 255, 0.1); color: var(--electric-blue); animation: pulse 1s infinite; }
    .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    /* 🛰️ Send Monitor Modal */
    .monitor-modal {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(15px); z-index: 10000; display: none;
      align-items: center; justify-content: center;
    }

    .monitor-content {
      width: 90%; max-width: 600px; background: var(--card-bg);
      border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .monitor-list {
      max-height: 400px; overflow-y: auto; margin-top: 20px;
      padding-right: 5px;
    }

    .monitor-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    body.dark-mode .monitor-row { border-bottom-color: rgba(255,255,255,0.05); }

    .progress-bar-container {
      width: 100%; height: 8px; background: rgba(0,0,0,0.1);
      border-radius: 10px; overflow: hidden; margin: 15px 0;
    }

    .progress-fill { height: 100%; width: 0%; background: var(--electric-blue); transition: 0.3s; }

    /* 🛸 Circuit BG Animation */
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="dark-mode">
  <div class="circuit-bg"></div>

  <!-- 📊 Live Send Monitor Modal -->
  <div class="monitor-modal" id="sendMonitor">
    <div class="monitor-content">
      <div class="card-title">
        <span id="monitorIcon">🚀</span> 
        <span id="monitorTitle">جاري إرسال الشهادات...</span>
      </div>
      
      <div class="progress-bar-container">
        <div class="progress-fill" id="overallProgress"></div>
      </div>
      
      <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 800;">
        <span id="monitorCount">تم إرسال: 0 / 0</span>
        <span id="monitorPercent">0%</span>
      </div>

      <div class="monitor-list" id="monitorList">
        <!-- Status rows will go here -->
      </div>

      <div style="margin-top: 25px; display: none;" id="monitorActions">
        <button class="btn btn-primary" onclick="closeMonitor()">إغلاق النافذة ✅</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-content">
      <div class="nav-brand">
        <a href="index.html" style="text-decoration: none;">
          <h2>⚡ <span class="brand-text">Eduneers</span> | الشهادات 🎓</h2>
        </a>
      </div>
      <div class="nav-actions">
        <div class="nav-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
        <a href="index.html" class="nav-btn" title="الرئيسية">🏠</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <main>
      <section class="glass-card">
        <div class="card-title"><span>🎨</span> تصميم قالب الشهادة</div>
        <div style="margin-bottom: 20px;">
          <label for="templateUpload" class="btn btn-outline" style="cursor: pointer;">📤 ارفع قالب الشهادة (صورة)</label>
          <input type="file" id="templateUpload" accept="image/*" style="display: none;" onchange="handleTemplateUpload(this)">
        </div>
        <div class="designer-canvas-container" id="canvasContainer">
          <canvas id="certCanvas"></canvas>
          <!-- Tooltip -->
          <div id="coordTooltip"></div>
          <!-- Drag Overlay (captures mouse events) -->
          <div class="canvas-drag-overlay" id="canvasDragOverlay"></div>
          <div class="canvas-overlay-text" id="canvasHint">📤 ارفع الشهادة أولاً<br><span style="font-size:0.8rem; opacity:0.7;">ثم اسحب الاسم لمكانه</span></div>
        </div>
        <!-- Position Info Bar -->
        <div class="position-info" id="positionInfo" style="display:none;">
          <span>📍 موضع الاسم: <span class="coord-val" id="coordDisplay">X: 0 | Y: 0</span></span>
          <button class="snap-btn" onclick="snapToCenter()">⬛ توسيط أفقي</button>
        </div>
        <div class="controls-grid">
          <div class="control-item"><label>حجم الخط</label><input type="number" id="fontSize" value="50" oninput="updatePreview()"></div>
          <div class="control-item"><label>لون الخط</label><input type="color" id="textColor" value="#000000" oninput="updatePreview()"></div>
          <div class="control-item"><label>نوع الخط</label><select id="fontFamily" onchange="updatePreview()"><option value="Cairo">Cairo</option><option value="Arial">Arial</option><option value="Traditional Arabic">Arabic</option></select></div>
          <div class="control-item"><label>نمط الخط</label><select id="fontWeight" onchange="updatePreview()"><option value="normal">عادي</option><option value="bold" selected>Bold</option></select></div>
        </div>
      </section>

      <section class="glass-card" id="resultsSection" style="display: none;">
        <div class="card-title"><span>✨</span> الشهادات الجاهزة</div>
        <div id="resultsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px;"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <button class="btn btn-primary" style="flex:1" onclick="downloadAllZip()">📥 تحميل ZIP</button>
          <button class="btn btn-email" style="flex:1" onclick="sendAllEmails()">📧 إيميل الكل</button>
          <button class="btn btn-drive" style="flex:1" onclick="uploadAllToDrive()">☁️ رفع للدرايف</button>
        </div>
      </section>
    </main>

    <aside>
      <section class="glass-card">
        <div class="card-title"><span>📋</span> قائمة الأسماء</div>
        <textarea id="dataInput" rows="12" placeholder="الكود&#9;الاسم بالعربي&#9;رابط الدرايف
(انسخ العمود B ثم C ثم D من الشيت وضعهم هنا)" oninput="parseInput()"></textarea>
        <div id="parsedCount" style="font-weight: 800; font-size: 0.9rem; margin: 10px 0; color: var(--accent);">عدد المتدربين: 0</div>
        <button class="btn btn-primary" onclick="generateAll()">⚡ إنشاء الشهادات</button>
        <div id="studentListContainer" style="margin-top: 20px; max-height: 400px; overflow-y: auto;"></div>
      </section>
    </aside>
  </div>

  <script>
    const ATTENDANCE_API_URL = "https://script.google.com/macros/s/AKfycbyJEb3_K7ORGnidD1GT6AjDS3kGgHjBMMAZ7iKT7tkI4JKR7pfRknMl-UumqqWW_5Hk3Q/exec";
    let templateImg = null, nameX = 0, nameY = 0, students = [], generatedCerts = [];
    const canvas = document.getElementById('certCanvas'), ctx = canvas.getContext('2d');

    window.onload = () => {
      if (localStorage.getItem('theme') === 'light') { document.body.classList.remove('dark-mode'); document.getElementById('themeBtn').innerText = '☀️'; }
    };

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeBtn').innerText = isDark ? '🌙' : '☀️';
      updatePreview();
    }

    function handleTemplateUpload(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        templateImg = new Image();
        templateImg.onload = () => {
          canvas.width = templateImg.width; canvas.height = templateImg.height;
          nameX = canvas.width / 2; nameY = canvas.height / 2;
          document.getElementById('canvasHint').style.display = 'none';
          document.getElementById('positionInfo').style.display = 'flex';
          updatePreview();
          updateCoordDisplay();
        };
        templateImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ═══════════════════════════════════════════
    // 🎯 LIVE DRAG SYSTEM
    // ═══════════════════════════════════════════
    let isDragging = false;
    const overlay = document.getElementById('canvasDragOverlay');
    const container = document.getElementById('canvasContainer');
    const tooltip = document.getElementById('coordTooltip');

    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
        rx: clientX - rect.left, // relative to displayed canvas
        ry: clientY - rect.top
      };
    }

    function setPosition(e) {
      if (!templateImg) return;
      const pos = getCanvasPos(e);
      nameX = Math.max(0, Math.min(pos.x, canvas.width));
      nameY = Math.max(0, Math.min(pos.y, canvas.height));
      updatePreview();
      updateCoordDisplay();
      // Update tooltip
      tooltip.style.display = 'block';
      tooltip.style.left = (pos.rx + 12) + 'px';
      tooltip.style.top = (pos.ry - 28) + 'px';
      tooltip.innerText = `X: ${Math.round(nameX)} | Y: ${Math.round(nameY)}`;
    }

    function updateCoordDisplay() {
      const el = document.getElementById('coordDisplay');
      if (el) el.innerText = `X: ${Math.round(nameX)} | Y: ${Math.round(nameY)}`;
    }

    // Mouse Events
    overlay.addEventListener('mousedown', (e) => {
      if (!templateImg) return;
      isDragging = true;
      container.classList.add('dragging');
      setPosition(e);
    });

    overlay.addEventListener('mousemove', (e) => {
      if (!templateImg) return;
      if (isDragging) setPosition(e);
      else {
        // Just show tooltip on hover
        const pos = getCanvasPos(e);
        tooltip.style.display = 'block';
        tooltip.style.left = (pos.rx + 12) + 'px';
        tooltip.style.top = (pos.ry - 28) + 'px';
        tooltip.innerText = `X: ${Math.round(pos.x)} | Y: ${Math.round(pos.y)}`;
      }
    });

    overlay.addEventListener('mouseleave', () => {
      isDragging = false;
      container.classList.remove('dragging');
      tooltip.style.display = 'none';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      container.classList.remove('dragging');
    });

    // Touch Events (Mobile)
    overlay.addEventListener('touchstart', (e) => { if (!templateImg) return; isDragging = true; setPosition(e); e.preventDefault(); }, { passive: false });
    overlay.addEventListener('touchmove', (e) => { if (isDragging) setPosition(e); e.preventDefault(); }, { passive: false });
    overlay.addEventListener('touchend', () => { isDragging = false; });

    function snapToCenter() {
      if (!templateImg) return;
      nameX = canvas.width / 2;
      updatePreview();
      updateCoordDisplay();
    }

    // ═══════════════════════════════════════════
    // 🖼️ DRAW PREVIEW
    // ═══════════════════════════════════════════
    function updatePreview() {
      if (!templateImg) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(templateImg, 0, 0);

      const fs = document.getElementById('fontSize').value;
      const col = document.getElementById('textColor').value;
      const ff = document.getElementById('fontFamily').value;
      const fw = document.getElementById('fontWeight').value;

      // ── Draw center guide lines (subtle dashed) ──
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      ctx.save();
      ctx.setLineDash([12, 8]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(0, 210, 255, 0.25)';
      // Vertical center
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
      // Horizontal center
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // ── Draw name text ──
      ctx.fillStyle = col;
      ctx.font = `${fw} ${fs}px ${ff}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('الاسم هنا', nameX, nameY);

      // ── Draw position crosshair ──
      ctx.save();
      ctx.strokeStyle = 'rgba(245, 176, 65, 0.8)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(nameX - 30, nameY); ctx.lineTo(nameX + 30, nameY);
      ctx.moveTo(nameX, nameY - 30); ctx.lineTo(nameX, nameY + 30);
      ctx.stroke();
      // Center dot
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(245, 176, 65, 0.9)';
      ctx.beginPath(); ctx.arc(nameX, nameY, 5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function parseInput() {
      const lines = document.getElementById('dataInput').value.split('\n').filter(l => l.trim() !== "");
      students = lines.map(l => {
        // Support tab (Google Sheets paste) or comma separated
        const p = l.split(/\t|,/);
        // Expected order from sheet: Code, Name, DriveLink
        const code = (p[0] || '').trim();
        const name = (p[1] || '').trim();
        const driveLink = (p[2] || '').trim();
        return { code, name, driveLink };
      }).filter(s => s.name); // must have a name
      document.getElementById('parsedCount').innerText = `عدد المتدربين: ${students.length}`;
      renderList();
    }

    function renderList() {
      document.getElementById('studentListContainer').innerHTML = students.map((s, i) => `
        <div class="student-item">
          <div style="flex:1; overflow:hidden;">
            <b>${s.name}</b>
            <br><span style="font-size:11px; color:var(--electric-blue); font-family:monospace;">${s.code || '—'}</span>
            ${s.driveLink ? `<br><span style="font-size:10px; color:var(--text-muted);">☁️ Drive مرتبط</span>` : ''}
          </div>
          <button class="snap-btn" onclick="uploadIndividualToDrive(${i})" title="رفع للدرايف" ${!s.driveLink ? 'disabled' : ''}>☁️</button>
        </div>
      `).join('');
    }

    async function generateAll() {
      if (!templateImg) return alert("ارفع القالب أولاً");
      if (students.length === 0) return alert("أدخل بيانات المتدربين أولاً");
      generatedCerts = []; 
      document.getElementById('resultsSection').style.display = 'block';
      const grid = document.getElementById('resultsGrid'); grid.innerHTML = "";
      const fs = document.getElementById('fontSize').value, col = document.getElementById('textColor').value, ff = document.getElementById('fontFamily').value, fw = document.getElementById('fontWeight').value;

      for (let i = 0; i < students.length; i++) {
        const s = students[i], off = document.createElement('canvas');
        off.width = templateImg.width; off.height = templateImg.height;
        const octx = off.getContext('2d');
        octx.drawImage(templateImg, 0, 0);
        octx.fillStyle = col; octx.font = `${fw} ${fs}px ${ff}`;
        octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillText(s.name, nameX, nameY);
        const url = off.toDataURL('image/jpeg', 0.9);
        // 🔑 Filename uses CODE not name
        const filename = s.code ? `${s.code}.jpg` : `${s.name}.jpg`;
        generatedCerts.push({ ...s, dataUrl: url, filename });
        grid.innerHTML += `
          <div style="text-align:center">
            <img src="${url}" style="width:100%; border-radius:10px;">
            <small style="font-family:monospace; color:var(--electric-blue);">${s.code || s.name}</small>
          </div>`;
      }
    }

    function downloadAllZip() {
      if (generatedCerts.length === 0) return alert("أنشئ الشهادات أولاً");
      const zip = new JSZip();
      // Use code as filename
      generatedCerts.forEach(c => zip.file(c.filename || `${c.name}.jpg`, certToBlob(c.dataUrl)));
      zip.generateAsync({type:"blob"}).then(b => saveAs(b, "Certificates_Eduneers.zip"));
    }
    function certToBlob(url) { const b = atob(url.split(',')[1]), a = new Uint8Array(b.length); for(let i=0; i<b.length; i++) a[i]=b.charCodeAt(i); return new Blob([a], {type:'image/jpeg'}); }

    function getAuth() {
      const email = localStorage.getItem('userEmail');
      const token = localStorage.getItem('sessionToken');
      return `&email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`;
    }

    // ═══════════════════════════════════════════
    // ☁️ GOOGLE DRIVE UPLOAD
    // ═══════════════════════════════════════════
    function extractFolderId(link) {
      const match = link.match(/folders\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    async function uploadIndividualToDrive(index, isBulk = false) {
      const cert = generatedCerts[index];
      if (!cert) { if(!isBulk) alert("أنشئ الشهادات أولاً"); return false; }
      if (!cert.driveLink) { if(!isBulk) alert("لا يوجد رابط درايف لهذا المتدرب"); return false; }

      const folderId = extractFolderId(cert.driveLink);
      if (!folderId) { 
        if(isBulk) updateStatusRow(`status-${index}`, 'error', 'رابط غير صحيح');
        else alert("تعذّر قراءة رابط الدرايف");
        return false;
      }

      if (isBulk) updateStatusRow(`status-${index}`, 'sending', '☁️ جاري الرفع...');

      try {
        const res = await fetch(ATTENDANCE_API_URL + "?" + getAuth(), {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "uploadToDrive",
            folderId: folderId,
            attachment: {
              data: cert.dataUrl.split(',')[1],
              mimeType: "image/jpeg",
              filename: cert.filename  // Code.jpg
            }
          })
        });
        const text = await res.text();
        const d = JSON.parse(text);
        if (d.status === 'success') {
          if(isBulk) updateStatusRow(`status-${index}`, 'success', '✅ تم الرفع');
          else alert(`✅ تم رفع شهادة ${cert.name} (${cert.filename}) بنجاح!`);
          return true;
        } else {
          if(isBulk) updateStatusRow(`status-${index}`, 'error', `❌ ${d.message}`);
          else alert(`❌ فشل: ${d.message}`);
          return false;
        }
      } catch(e) {
        if(isBulk) updateStatusRow(`status-${index}`, 'error', 'خطأ في الاتصال');
        return false;
      }
    }

    async function uploadAllToDrive() {
      if (generatedCerts.length === 0) return alert("أنشئ الشهادات أولاً");
      if (!generatedCerts.some(c => c.driveLink)) return alert("لا يوجد روابط درايف في البيانات!");

      // Open monitor
      const modal = document.getElementById('sendMonitor');
      document.getElementById('monitorIcon').innerText = '☁️';
      document.getElementById('monitorTitle').innerText = 'جاري الرفع على Google Drive...';
      document.getElementById('monitorCount').innerText = `تم رفع: 0 / ${generatedCerts.length}`;
      modal.style.display = 'flex';

      const list = document.getElementById('monitorList');
      list.innerHTML = generatedCerts.map((c, i) => `
        <div class="monitor-row">
          <div>
            <span style="font-weight:700;">${c.name}</span>
            <span style="font-size:11px; font-family:monospace; color:var(--electric-blue); margin-right:8px;">${c.code || ''}</span>
          </div>
          <span class="status-badge status-pending" id="status-${i}">في الانتظار</span>
        </div>
      `).join('');

      let success = 0;
      for (let i = 0; i < generatedCerts.length; i++) {
        const ok = await uploadIndividualToDrive(i, true);
        if (ok) success++;
        const percent = Math.round(((i + 1) / generatedCerts.length) * 100);
        document.getElementById('overallProgress').style.width = percent + '%';
        document.getElementById('monitorPercent').innerText = percent + '%';
        document.getElementById('monitorCount').innerText = `تم رفع: ${i+1} / ${generatedCerts.length}`;
        await new Promise(r => setTimeout(r, 300));
      }

      document.getElementById('monitorTitle').innerText = `اكتمل الرفع! (${success}/${generatedCerts.length} ناجح)`;
      document.getElementById('monitorIcon').innerText = '✅';
      document.getElementById('monitorActions').style.display = 'block';
    }

    // ═══════════════════════════════════════════
    // 📧 EMAIL SEND LOGIC
    // ═══════════════════════════════════════════
    async function sendIndividual(index, isBulk = false) {
      const cert = generatedCerts[index];
      const contact = cert?.contact || cert?.email || '';
      if (!cert || !contact) { if(!isBulk) alert("لا يوجد بريد إلكتروني"); return false; }

      const rowId = `status-${index}`;
      if (isBulk) updateStatusRow(rowId, 'sending', 'جاري الإرسال...');

      try {
        const res = await fetch(ATTENDANCE_API_URL + "?" + getAuth(), {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "sendBroadcast",
            target: contact,
            subject: `شهادة Eduneers - ${cert.name}`,
            body: `أهلاً ${cert.name}، شهادتك مرفقة.`,
            attachment: { data: cert.dataUrl.split(',')[1], mimeType: "image/jpeg", filename: cert.filename }
          })
        });
        const d = await res.json();
        if (d.status === 'success') { if(isBulk) updateStatusRow(rowId, 'success', 'تم ✅'); return true; }
        else { if(isBulk) updateStatusRow(rowId, 'error', `فشل`); return false; }
      } catch(e) {
        if(isBulk) updateStatusRow(rowId, 'error', 'خطأ'); return false;
      }
    }

    async function sendAllEmails() {
      if (generatedCerts.length === 0) return alert("أنشئ الشهادات أولاً");
      const modal = document.getElementById('sendMonitor');
      document.getElementById('monitorIcon').innerText = '📧';
      document.getElementById('monitorTitle').innerText = 'جاري إرسال الشهادات بالإيميل...';
      modal.style.display = 'flex';
      const list = document.getElementById('monitorList');
      list.innerHTML = generatedCerts.map((c, i) => `
        <div class="monitor-row">
          <span style="font-weight:700;">${c.name}</span>
          <span class="status-badge status-pending" id="status-${i}">في الانتظار</span>
        </div>
      `).join('');
      let success = 0;
      for (let i = 0; i < generatedCerts.length; i++) {
        const ok = await sendIndividual(i, true);
        if (ok) success++;
        const percent = Math.round(((i + 1) / generatedCerts.length) * 100);
        document.getElementById('overallProgress').style.width = percent + '%';
        document.getElementById('monitorPercent').innerText = percent + '%';
        document.getElementById('monitorCount').innerText = `تم إرسال: ${i+1} / ${generatedCerts.length}`;
        await new Promise(r => setTimeout(r, 500));
      }
      document.getElementById('monitorTitle').innerText = 'اكتملت العملية!';
      document.getElementById('monitorIcon').innerText = '✅';
      document.getElementById('monitorActions').style.display = 'block';
    }

    function updateStatusRow(id, type, text) {
      const el = document.getElementById(id); if (!el) return;
      el.className = `status-badge status-${type}`;
      el.innerText = text;
    }

    function closeMonitor() {
      document.getElementById('sendMonitor').style.display = 'none';
      document.getElementById('monitorActions').style.display = 'none';
      document.getElementById('monitorTitle').innerText = 'جاري الإرسال...';
      document.getElementById('monitorIcon').innerText = '🚀';
      document.getElementById('overallProgress').style.width = '0%';
      document.getElementById('monitorCount').innerText = 'تم: 0 / 0';
      document.getElementById('monitorPercent').innerText = '0%';
    }
  </script>
</body>
</html>
